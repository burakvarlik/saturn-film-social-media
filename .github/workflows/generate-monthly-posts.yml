name: Aylık Saturn Postlarını Üret

on:
  workflow_dispatch:
    inputs:
      month_label:
        description: 'Hedef ay (ör. "Temmuz 2026")'
        required: true
        default: 'Temmuz 2026'
      year:
        description: 'Yıl'
        required: true
        default: '2026'
      month:
        description: 'Ay numarası (1-12)'
        required: true
        default: '7'
  schedule:
    # Her ayın 25'inde 06:00 UTC (09:00 Istanbul) — bir sonraki ay için üret
    - cron: '0 6 25 * *'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları yükle
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libcairo2 libpango-1.0-0 libpangoft2-1.0-0
          pip install --quiet -r scripts/requirements.txt

      - name: Postları üret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python -u scripts/generate_posts.py \
            --year ${{ github.event.inputs.year || '2026' }} \
            --month ${{ github.event.inputs.month || '7' }} \
            --month-label "${{ github.event.inputs.month_label || 'Bir sonraki ay' }}" \
            2>&1 | tee debug.txt || true

      - name: Debug log'u commit et (her durumda)
        if: always()
        run: |
          git config user.name "Saturn Bot"
          git config user.email "saturn-bot@github.com"
          [ -f debug.txt ] && git add debug.txt || true
          git diff --cached --quiet || git commit -m "🐛 Debug log"
          git push || true

      - name: Üretilen postları commit et
        if: success()
        env:
          MONTH_LABEL: ${{ github.event.inputs.month_label || 'Bir sonraki ay' }}
        run: |
          git config user.name "Saturn Bot"
          git config user.email "saturn-bot@github.com"
          git add posts/
          if git diff --cached --quiet; then
            echo "Yeni dosya yok"
          else
            git commit -m "🎬 Yeni Saturn postları: $MONTH_LABEL"
            git push
          fi
